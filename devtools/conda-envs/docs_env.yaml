name: docs
channels:
  - conda-forge
  - mdtools
dependencies:
    # Base dependencies
  - python
  - pip
  - numpy
  - pandas
  - periodictable
  - pyyaml

    # Machine learning dependencies
  - pytorch
  - lightning
  - opt-einsum

    # Build dependencies for COSMOSAC reference package
  - cmake
  - ninja
  - c-compiler
  - cxx-compiler

    # Testing
  - pytest
  - pytest-cov

  # Docs building
  - matplotlib
  - sphinx
  - sphinxcontrib-bibtex
  - sphinx-copybutton
